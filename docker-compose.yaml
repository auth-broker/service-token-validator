services:
  service:
    build:
      context: .
    environment:
      TOKEN_VALIDATOR_TYPE: "${TOKEN_VALIDATOR_TYPE:-}"
      TOKEN_VALIDATOR_OIDC_ISSUERS: "${TOKEN_VALIDATOR_OIDC_ISSUERS:-}"
      TOKEN_VALIDATOR_OIDC_ALGORITHMS: '${TOKEN_VALIDATOR_OIDC_ALGORITHMS:-[]}'
    volumes:
      - ./src:/package/src
      - ./tests:/package/tests
    ports:
      - "8001:80"
